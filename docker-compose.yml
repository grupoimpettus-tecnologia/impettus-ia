services:
  backend:
    build: ./backend
    container_name: impettus-ia-backend
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build: ./frontend
    container_name: impettus-ia-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
